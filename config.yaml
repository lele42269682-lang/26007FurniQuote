# FurniQuote AI · 统一配置文件
# 版本: v1.0 · 编码就绪
# 所有可调参数集中此处，禁止在代码中硬编码

app:
  name: "FurniQuote AI"
  version: "0.1.0"
  env: "development"   # development / staging / production
  host: "0.0.0.0"
  port: 8000
  debug: true

logging:
  level: "INFO"        # DEBUG / INFO / WARNING / ERROR
  rotation_mb: 10
  backup_count: 5

db:
  url: "sqlite:///./data/furniquote.db"
  echo: false

redis:
  url: "redis://localhost:6379/0"

chroma:
  persist_dir: "./chroma_db"
  collection: "furniquote_history_quotes"

# ===== 五维定价系数（M-10 报价引擎专用，按需求 v6.0 第四部分录入）=====
pricing:
  # 维度一：客户级别系数
  customer_tier:
    L1: 1.0       # 长期设计公司 + 零售经销商
    L2: 1.2       # 散单设计师
    L3: 1.55      # 零售客户（1.5~1.6 取中位）
    L4: 1.0       # 大型工程（酒店）≈ L1
    L5: null      # 美国批发商等长期大批量，锁价协议（人工）

  # 维度二：数量阶梯系数
  quantity_ladder:
    - { min: 1,    max: 2,    coef: 1.00 }
    - { min: 3,    max: 9,    coef: 0.92 }
    - { min: 10,   max: 49,   coef: 0.82 }
    - { min: 50,   max: 99,   coef: 0.75 }
    - { min: 100,  max: null, coef: 0.68 }

  # 维度三：汇率
  exchange_rate:
    update_interval_days: 7
    fluctuation_threshold: 0.03   # ±3% 内不调整
    base_currency: "CNY"
    target_currencies: ["USD", "IDR"]

  # 维度四：客户价格承受力
  price_acceptance:
    A: 1.15       # 不敏感（1.1~1.2 取中位）
    B: 1.00       # 正常（默认）
    C: 0.925      # 敏感（0.9~0.95 取中位）

  # 维度五：地区消费力系数
  region:
    US: 1.3       # 美国
    AU: 1.2       # 澳大利亚
    AE: 1.3       # 中东（迪拜/沙特）
    SA: 1.3       # 沙特
    RU: 1.1       # 俄罗斯
    AM: 1.1       # 亚美尼亚
    ID: 1.0       # 印尼
    MY: 1.0       # 马来西亚
    TH: 1.0       # 泰国
    CN: 1.0       # 中国国内（基准）

# ===== 客户编号 =====
customer:
  id_format: "C-{region}-{seq:03d}"
  region_codes: ["US", "AU", "AE", "SA", "RU", "AM", "ID", "MY", "TH", "CN"]

# ===== 产品编号 =====
product:
  id_format: "{category}-{year}-{seq:03d}"
  category_codes:
    SF: "沙发"
    BD: "床架"
    CB: "橱柜"
    TB: "餐桌"
    CH: "椅子"

# ===== 19 个模块开关（热拔插）=====
modules:
  m01_auth:           { enabled: false, priority: "P1" }
  m02_folder:         { enabled: false, priority: "P1" }
  m03_ai_recognize:   { enabled: false, priority: "P1" }
  m04_annotation:     { enabled: false, priority: "P1" }
  m05_expert:         { enabled: false, priority: "P1" }
  m06_material:       { enabled: false, priority: "P0" }
  m07_dict:           { enabled: false, priority: "P1" }
  m08_stats:          { enabled: false, priority: "P1" }
  m09_prompt:         { enabled: false, priority: "P1" }
  m10_pricing:        { enabled: false, priority: "P0" }
  m11_3d_modeling:    { enabled: false, priority: "P0" }
  m12_3d_material:    { enabled: false, priority: "P0" }
  m13_3d_viewer:      { enabled: false, priority: "P0" }
  m14_quote_doc:      { enabled: false, priority: "P1" }
  m15_customer:       { enabled: false, priority: "P0" }
  m16_workflow:       { enabled: false, priority: "P1" }
  m17_dingtalk:       { enabled: false, priority: "P1" }
  m18_portal:         { enabled: false, priority: "P2" }
  m19_security:       { enabled: false, priority: "P1" }
  m20_bug_tracking:   { enabled: true,  priority: "P1" }   # 🐞 一开始就启用，开发期就要用
  m21_bug_report:     { enabled: true,  priority: "P1" }   # 🐞 与 m20 配套

# ===== 密钥变量名清单（实际值从 Keychain 注入，不在此处存值）=====
secrets:
  required:
    - DASHSCOPE_API_KEY
    - HUNYUAN3D_API_KEY
    - SEEDREAM_API_KEY
  optional:
    - ANTHROPIC_API_KEY
    - DEEPSEEK_API_KEY
    - DINGTALK_APP_KEY
    - DINGTALK_APP_SECRET

# ===== Bug 管理与上报 =====
bug_tracking:
  id_format: "BUG-{year}-{seq:04d}"
  auto_assign:
    critical: "tech_lead"      # 严重级 Bug 自动指派给技术负责人
    high: "module_owner"       # 高级 Bug 指派给模块负责人
  notification:
    dingtalk_on_critical: true
    dingtalk_on_high: true
    email_on_close: true
  retention_days: 365          # Bug 记录保留期

bug_report:
  rate_limit_per_user_per_hour: 20
  auto_collect:
    page_url: true
    user_agent: true
    console_logs: true
    screenshot: true            # 客户端 SDK 自动截屏
    network_recent_requests: 10 # 保留最近 N 条请求记录
  auto_report_on_test_failure: true   # 自动化测试失败 → 自动建 Bug

# ===== 自动化测试系统 =====
testing:
  layers:
    auto: true                 # 第一层：pytest 自动化测试
    manual: true               # 第二层：tests/manual/ 手工测试文档
    dashboard: true            # 第三层：tests/test_ui/ 测试 Dashboard
  ci:
    enabled: true
    provider: "github_actions"
    triggers: ["push", "pull_request"]
    required_passing: true     # 测试不通过禁止合并
    coverage_threshold: 70     # 覆盖率最低线（百分比）
  pre_commit:
    enabled: true
    run_smoke_tests: true      # commit 前自动跑烟囱测试
    block_on_failure: true
  watch_mode:
    enabled: false             # 开发模式下文件变化触发增量测试
  failure_handling:
    create_bug_on_fail: true   # 失败自动经 m21_bug_report 建 Bug
    notify_dingtalk: true

# ===== 客户门户安全 =====
portal:
  otp_expire_seconds: 300
  device_fingerprint_required: true
  quote_view_max_per_day: 10
  ip_anomaly_alert: true
